<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Euler Miro App</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
</head>
<body>
  <script>
    async function init() {
      await miro.board.ui.on("icon:click", async () => {
        await miro.board.ui.openPanel({
          url: "https://bjashon.github.io/dynamic-shemes/euler.html"
        });
      });
    }
    init();
  </script>
</body>
</html>
